name: GitHub Change Risk
description: Deterministic public PR-diff risk cues without an API token or code execution.
author: Orange Vakaris

inputs:
  repository:
    description: Public GitHub repository in owner/repository form.
    required: true
    default: ${{ github.repository }}
  base:
    description: Base commit SHA or ref.
    required: true
  head:
    description: Head commit SHA or ref.
    required: true
  fail-on:
    description: "Fail at or above this risk level: never, low, medium, or high."
    required: false
    default: "never"
  payment-tx:
    description: Optional confirmed Base USDC or ETH transaction hash for a per-file report.
    required: false
    default: ""
  api-url:
    description: Base URL for the GitHub Change Risk API.
    required: false
    default: https://76.13.79.47.nip.io
  comment:
    description: Post the aggregate report as a pull request comment when true.
    required: false
    default: "false"
  github-token:
    description: GitHub token with pull-requests write permission when commenting.
    required: false
    default: ""
  pull-request-number:
    description: Pull request number to comment on when comment is true.
    required: false
    default: ""

outputs:
  risk-score:
    description: Aggregate risk score from 0 through 100.
    value: ${{ steps.risk.outputs.risk-score }}
  risk-level:
    description: "Risk level: low, medium, or high."
    value: ${{ steps.risk.outputs.risk-level }}
  report:
    description: Compact JSON report.
    value: ${{ steps.risk.outputs.report }}
  checkout-url:
    description: Prefilled landing-page URL for the selected public comparison.
    value: ${{ steps.risk.outputs.checkout-url }}

branding:
  icon: shield
  color: orange

runs:
  using: composite
  steps:
    - id: risk
      shell: bash
      env:
        API_URL: ${{ inputs.api-url }}
        REPOSITORY: ${{ inputs.repository }}
        BASE: ${{ inputs.base }}
        HEAD: ${{ inputs.head }}
        FAIL_ON: ${{ inputs.fail-on }}
        PAYMENT_TX: ${{ inputs.payment-tx }}
        COMMENT: ${{ inputs.comment }}
        GH_TOKEN: ${{ inputs.github-token }}
        PULL_REQUEST_NUMBER: ${{ inputs.pull-request-number }}
      run: |
        set -euo pipefail
        case "$FAIL_ON" in
          never) fail_threshold=3 ;;
          low) fail_threshold=0 ;;
          medium) fail_threshold=1 ;;
          high) fail_threshold=2 ;;
          *) echo "fail-on must be never, low, medium, or high" >&2; exit 1 ;;
        esac
        endpoint="$API_URL/v1/github-risk-delta"
        args=(--get --data-urlencode "repo=$REPOSITORY" --data-urlencode "base=$BASE" --data-urlencode "head=$HEAD")
        if [ -n "$PAYMENT_TX" ]; then
          endpoint="$endpoint/full"
          args+=(--data-urlencode "paymentTx=$PAYMENT_TX")
        fi
        report="$(curl --fail-with-body --silent --show-error --connect-timeout 10 --max-time 45 --retry 2 --retry-all-errors "${args[@]}" "$endpoint")"
        score="$(jq -er '.risk.score' <<<"$report")"
        level="$(jq -er '.risk.level' <<<"$report")"
        compact="$(jq -c . <<<"$report")"
        pricing_url="${API_URL%/}/pricing"
        checkout_query="$(jq -rn --arg repo "$REPOSITORY" --arg base "$BASE" --arg head "$HEAD" '$ARGS.named | to_entries | map(.key + "=" + (.value | @uri)) | join("&")')"
        checkout_url="${API_URL%/}/?$checkout_query"
        {
          echo "risk-score=$score"
          echo "risk-level=$level"
          echo "report=$compact"
          echo "checkout-url=$checkout_url"
        } >> "$GITHUB_OUTPUT"
        {
          echo "## GitHub Change Risk"
          echo
          echo "- Score: **$score / 100**"
          echo "- Level: **$level**"
          echo
          echo '```json'
          jq '{comparison, risk}' <<<"$report"
          echo '```'
          if [ -z "$PAYMENT_TX" ]; then
            echo
            echo "Need the per-file report? [Open the prefilled Base payment flow]($checkout_url) (0.01 USDC or 0.00001 ETH)."
            echo "[Payment requirements]($pricing_url)"
          fi
        } >> "$GITHUB_STEP_SUMMARY"
        if [ "$COMMENT" = "true" ]; then
          if [ -z "$GH_TOKEN" ] || [ -z "$PULL_REQUEST_NUMBER" ]; then
            echo "github-token and pull-request-number are required when comment is true" >&2
            exit 1
          fi
          comment_body="$(printf '## GitHub Change Risk\n\n- Score: **%s / 100**\n- Level: **%s**\n\n```json\n%s\n```' "$score" "$level" "$(jq -c '{comparison, risk}' <<<"$report")")"
          gh api --method POST "repos/$REPOSITORY/issues/$PULL_REQUEST_NUMBER/comments" -f body="$comment_body" >/dev/null
        fi
        case "$level" in
          low) risk_rank=0 ;;
          medium) risk_rank=1 ;;
          high) risk_rank=2 ;;
          *) echo "API returned an unsupported risk level" >&2; exit 1 ;;
        esac
        if [ "$risk_rank" -ge "$fail_threshold" ]; then
          echo "Risk level $level meets fail-on threshold $FAIL_ON" >&2
          exit 1
        fi
