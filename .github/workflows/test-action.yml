name: Test Action

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  action:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - id: risk
        uses: ./
        with:
          repository: octocat/Hello-World
          base: master
          head: master
      - env:
          SCORE: ${{ steps.risk.outputs.risk-score }}
          LEVEL: ${{ steps.risk.outputs.risk-level }}
          CHECKOUT_URL: ${{ steps.risk.outputs.checkout-url }}
        run: |
          test "$SCORE" = "0"
          test "$LEVEL" = "low"
          test "$CHECKOUT_URL" = "https://76.13.79.47.nip.io/?repo=octocat%2FHello-World&base=master&head=master"
